<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Islamic AI Assistant</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0f172a;
    color: white;
}

header {
    padding: 15px;
    text-align: center;
    background: #020617;
}

#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    margin: 8px;
    padding: 12px;
    border-radius: 12px;
    max-width: 80%;
}

.user {
    background: #2563eb;
    align-self: flex-end;
}

.bot {
    background: #1e293b;
    align-self: flex-start;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: #020617;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

button {
    margin-left: 5px;
    padding: 10px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    color: white;
}

select {
    margin-top: 5px;
}
</style>
</head>

<body>

<header>
<h3>🕌 Islamic AI Assistant</h3>

<select id="lang">
<option value="en">English</option>
<option value="ur">Urdu</option>
<option value="ps">Pashto</option>
</select>
</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask Islamic question...">
<button onclick="send()">Send</button>
<button onclick="startVoice()">🎤</button>
</div>

<script>

function addMessage(text, type){
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;
    document.getElementById("chat").appendChild(msg);
}

// 🔒 Islamic filter
function isIslamic(text){
    let words = ["allah","dua","quran","hadith","islam","namaz","roza","zakat","fatwa","nikah"];
    return words.some(w => text.toLowerCase().includes(w));
}

// 🧠 Local fallback response
function localResponse(q, lang){

    if(!isIslamic(q)){
        return lang==="ur"
        ? "⚠️ یہ ایپ صرف اسلامی سوالات کے لیے ہے"
        : "⚠️ This app only answers Islamic questions";
    }

    if(q.includes("dua")){
        return "🤲 اللهم إنك عفو تحب العفو فاعف عني";
    }

    if(q.includes("sad") || q.includes("stress")){
        return "📖 Qur’an 94:6 — Indeed, with hardship comes ease";
    }

    if(q.includes("fatwa") || q.includes("how")){
        return "⚖️ Hanafi Fatwa:\nhttps://darulifta-deoband.com\nhttps://askimam.org";
    }

    return "🕌 Hadith: Actions are judged by intentions (Bukhari)";
}

// 🌐 Send to backend (optional)
async function send(){
    let input = document.getElementById("input");
    let lang = document.getElementById("lang").value;
    let text = input.value;

    if(!text) return;

    addMessage(text, "user");

    try {
        let res = await fetch("https://YOUR-BACKEND.onrender.com/ask", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({q:text, lang:lang})
        });

        let data = await res.json();
        addMessage(data.answer, "bot");

    } catch {
        // fallback if backend not connected
        addMessage(localResponse(text, lang), "bot");
    }

    input.value="";
}

// 🎤 Voice input
function startVoice(){
    let rec = new webkitSpeechRecognition();
    let lang = document.getElementById("lang").value;

    if(lang==="ur") rec.lang="ur-PK";
    else if(lang==="ps") rec.lang="ps";
    else rec.lang="en-US";

    rec.onresult = e => {
        document.getElementById("input").value = e.results[0][0].transcript;
    };

    rec.start();
}

</script>

</body>
</ht
